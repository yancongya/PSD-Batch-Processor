name: Build PSD Batch Processor

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Build mode'
        required: true
        default: 'all'
        type: choice
        options:
          - windowed
          - console
          - onefile
          - all

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
      
    - uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        
    - name: Build
      run: |
        $ErrorActionPreference = "Stop"
        
        Write-Host "Installing dependencies..."
        python -m pip install --upgrade pip 2>&1 | Write-Host
        pip install pyinstaller PyQt5 PyQt-Fluent-Widgets pywin32 pillow 2>&1 | Write-Host
        
        Write-Host "Building..."
        python .github/build.py 2>&1 | Write-Host
        
        Write-Host "Build completed"
        
    - name: Create Release
      id: release
      run: |
        $version = "${{ github.ref_name }}"
        if ([string]::IsNullOrEmpty($version)) {
          $version = "dev-${{ github.run_number }}"
        }
        Write-Output "version=$version" >> $env:GITHUB_OUTPUT
        
        $releaseDir = "dist\PSDBatchProcessor-$version"
        
        if (Test-Path $releaseDir) {
          Remove-Item -Path $releaseDir -Recurse -Force
        }
        New-Item -ItemType Directory -Path $releaseDir -Force | Out-Null
        
        $dirs = @("PSDBatchProcessor-Windowed", "PSDBatchProcessor-Console", "PSDBatchProcessor-OneFile-Portable")
        foreach ($dir in $dirs) {
          if (Test-Path "dist\$dir") {
            $targetName = $dir -replace "PSDBatchProcessor-", ""
            Copy-Item -Path "dist\$dir" -Destination "$releaseDir\$targetName" -Recurse
          }
        }
        
        if (Test-Path "README.md") {
          Copy-Item -Path "README.md" -Destination $releaseDir
        }
        
        Compress-Archive -Path "$releaseDir\*" -DestinationPath "$releaseDir.zip"
        
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: PSD-Batch-Processor-${{ steps.release.outputs.version }}
        path: dist/PSDBatchProcessor-${{ steps.release.outputs.version }}.zip
        retention-days: 30
        
    - name: GitHub Release
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v1
      with:
        files: dist/PSDBatchProcessor-${{ steps.release.outputs.version }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}