name: Build PSD Batch Processor

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Build mode'
        required: true
        default: 'all'
        type: choice
        options:
          - windowed
          - console
          - onefile
          - all

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        
    - name: Build all versions
      shell: cmd
      id: build
      run: |
        cd tools
        call build_ci.bat
        
    - name: Get version
      shell: cmd
      id: version
      run: |
        set VERSION=%GITHUB_REF_NAME%
        if "%VERSION%"=="" set VERSION=dev-%GITHUB_RUN_NUMBER%
        echo version=%VERSION% >> %GITHUB_OUTPUT%
        
    - name: Zip Release
      shell: pwsh
      run: |
        $version = "${{ steps.version.outputs.version }}"
        $releaseDir = "dist\PSDBatchProcessor-$version"
        if (Test-Path $releaseDir) {
          Compress-Archive -Path "$releaseDir\*" -DestinationPath "$releaseDir.zip"
          Write-Host "Created zip: $releaseDir.zip"
        }
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PSD-Batch-Processor-${{ steps.version.outputs.version }}
        path: dist/PSDBatchProcessor-${{ steps.version.outputs.version }}.zip
        retention-days: 30
        
    - name: Create Release
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v1
      with:
        files: dist/PSDBatchProcessor-${{ steps.version.outputs.version }}.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}