name: Build PSD Batch Processor

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Build mode'
        required: true
        default: 'all'
        type: choice
        options:
          - windowed
          - console
          - onefile
          - all

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      shell: pwsh
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
      shell: pwsh
        
    - name: Install dependencies
      run: python -m pip install --upgrade pip; pip install pyinstaller PyQt5 PyQt-Fluent-Widgets pywin32 pillow
      shell: pwsh
        
    - name: Build all versions
      run: python .github/build.py
      shell: pwsh
        
    - name: Get version
      id: version
      run: |
        $version = "${{ github.ref_name }}"
        if ([string]::IsNullOrEmpty($version)) {
          $version = "dev-${{ github.run_number }}"
        }
        Write-Output "version=$version" >> $env:GITHUB_OUTPUT
      shell: pwsh
        
    - name: Create Release Package
      run: |
        $version = "${{ steps.version.outputs.version }}"
        $releaseDir = "dist\PSDBatchProcessor-$version"
        
        if (Test-Path $releaseDir) {
          Remove-Item -Path $releaseDir -Recurse -Force
        }
        New-Item -ItemType Directory -Path $releaseDir | Out-Null
        
        if (Test-Path "dist\PSDBatchProcessor-Windowed") {
          Copy-Item -Path "dist\PSDBatchProcessor-Windowed" -Destination "$releaseDir\Windowed" -Recurse
        }
        
        if (Test-Path "dist\PSDBatchProcessor-Console") {
          Copy-Item -Path "dist\PSDBatchProcessor-Console" -Destination "$releaseDir\Console" -Recurse
        }
        
        if (Test-Path "dist\PSDBatchProcessor-OneFile-Portable") {
          Copy-Item -Path "dist\PSDBatchProcessor-OneFile-Portable" -Destination "$releaseDir\OneFile" -Recurse
        }
        
        if (Test-Path "README.md") {
          Copy-Item -Path "README.md" -Destination $releaseDir
        }
        
        Write-Host "Created release package: $releaseDir"
      shell: pwsh
        
    - name: Zip Release
      run: |
        $version = "${{ steps.version.outputs.version }}"
        $releaseDir = "dist\PSDBatchProcessor-$version"
        if (Test-Path $releaseDir) {
          Compress-Archive -Path "$releaseDir\*" -DestinationPath "$releaseDir.zip"
          Write-Host "Created zip: $releaseDir.zip"
        }
      shell: pwsh
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PSD-Batch-Processor-${{ steps.version.outputs.version }}
        path: dist/PSDBatchProcessor-${{ steps.version.outputs.version }}.zip
        retention-days: 30
      shell: pwsh
        
    - name: Create Release
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v1
      with:
        files: dist/PSDBatchProcessor-${{ steps.version.outputs.version }}.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: pwsh