name: build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Debug environment
        run: |
          Write-Host "Current directory: $(Get-Location)"
          Write-Host "Files in current directory:"
          Get-ChildItem | Select-Object Name
          Write-Host "Files in .github directory:"
          Get-ChildItem .github | Select-Object Name
      - run: python .github/scripts/build.py
      - name: Check dist directory
        run: |
          Write-Host "Contents of dist directory:"
          if (Test-Path dist) {
            Get-ChildItem -Path dist -Recurse | Select-Object FullName, Length
          } else {
            Write-Host "dist directory does not exist!"
          }
      - name: Create release package
        run: |
          $version = "${{ github.ref_name }}"
          Write-Host "Creating release for version: $version"
          if (Test-Path dist) {
            Compress-Archive -Path dist\* -DestinationPath "PSDBatchProcessor-$version.zip"
            Write-Host "Created archive: PSDBatchProcessor-$version.zip"
          }
      - uses: softprops/action-gh-release@v1
        if: github.event_name == 'push'
        with:
          files: PSDBatchProcessor-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}