name: Build PSD Batch Processor

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Build mode'
        required: true
        default: 'all'
        type: choice
        options:
          - windowed
          - console
          - onefile
          - all

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PyQt5 PyQt-Fluent-Widgets pywin32 pillow
        
    - name: Clean old builds
      run: |
        if exist build rmdir /s /q build
        if exist dist rmdir /s /q dist
        if exist __pycache__ rmdir /s /q __pycache__
        
    - name: Build Windowed Mode
      if: github.event.inputs.build_mode == 'windowed' || github.event.inputs.build_mode == 'all' || github.event_name == 'push'
      run: |
        python -c "
        import subprocess
        import sys
        
        cmd = [
            'pyinstaller',
            '--name=PSDBatchProcessor-Windowed',
            '--noconsole',
            '--add-data=docs/guides/START_HERE.txt;docs/guides',
            '--add-data=docs/guides/QUICK_REFERENCE.txt;docs/guides',
            '--add-data=scripts/production/*.jsx;scripts/production',
            '--add-data=scripts/templates/*.jsx;scripts/templates',
            '--add-data=scripts/examples/*.jsx;scripts/examples',
            '--hidden-import=win32com',
            '--hidden-import=pythoncom',
            '--hidden-import=PIL',
            '--hidden-import=customtkinter',
            '--exclude-module=torch',
            '--exclude-module=torchvision',
            '--exclude-module=torchaudio',
            '--exclude-module=tensorflow',
            '--exclude-module=keras',
            '--exclude-module=scipy',
            '--exclude-module=numpy',
            '--exclude-module=sympy',
            '--exclude-module=onnxruntime',
            '--exclude-module=selenium',
            '--exclude-module=playwright',
            '--exclude-module=requests',
            '--exclude-module=beautifulsoup4',
            '--exclude-module=lxml',
            '--exclude-module=bs4',
            '--exclude-module=pandas',
            '--exclude-module=matplotlib',
            '--exclude-module=cv2',
            '--exclude-module=opencv-python',
            '--exclude-module=pytest',
            '--exclude-module=black',
            '--exclude-module=flake8',
            '--exclude-module=langchain',
            '--exclude-module=openai',
            '--exclude-module=anthropic',
            '--exclude-module=transformers',
            '--exclude-module=tokenizers',
            '--exclude-module=huggingface_hub',
            '--exclude-module=tkinter',
            '--exclude-module=turtle',
            '--clean',
            '--noconfirm',
            'src/main.py'
        ]
        
        result = subprocess.run(cmd)
        sys.exit(result.returncode)
        "
        
    - name: Build Console Mode
      if: github.event.inputs.build_mode == 'console' || github.event.inputs.build_mode == 'all'
      run: |
        python -c "
        import subprocess
        import sys
        
        cmd = [
            'pyinstaller',
            '--name=PSDBatchProcessor-Console',
            '--console',
            '--add-data=docs/guides/START_HERE.txt;docs/guides',
            '--add-data=docs/guides/QUICK_REFERENCE.txt;docs/guides',
            '--add-data=scripts/production/*.jsx;scripts/production',
            '--add-data=scripts/templates/*.jsx;scripts/templates',
            '--add-data=scripts/examples/*.jsx;scripts/examples',
            '--hidden-import=win32com',
            '--hidden-import=pythoncom',
            '--hidden-import=PIL',
            '--hidden-import=customtkinter',
            '--exclude-module=torch',
            '--exclude-module=torchvision',
            '--exclude-module=torchaudio',
            '--exclude-module=tensorflow',
            '--exclude-module=keras',
            '--exclude-module=scipy',
            '--exclude-module=numpy',
            '--exclude-module=sympy',
            '--exclude-module=onnxruntime',
            '--exclude-module=selenium',
            '--exclude-module=playwright',
            '--exclude-module=requests',
            '--exclude-module=beautifulsoup4',
            '--exclude-module=lxml',
            '--exclude-module=bs4',
            '--exclude-module=pandas',
            '--exclude-module=matplotlib',
            '--exclude-module=cv2',
            '--exclude-module=opencv-python',
            '--exclude-module=pytest',
            '--exclude-module=black',
            '--exclude-module=flake8',
            '--exclude-module=langchain',
            '--exclude-module=openai',
            '--exclude-module=anthropic',
            '--exclude-module=transformers',
            '--exclude-module=tokenizers',
            '--exclude-module=huggingface_hub',
            '--exclude-module=tkinter',
            '--exclude-module=turtle',
            '--clean',
            '--noconfirm',
            'src/main.py'
        ]
        
        result = subprocess.run(cmd)
        sys.exit(result.returncode)
        "
        
    - name: Build One-file Mode
      if: github.event.inputs.build_mode == 'onefile' || github.event.inputs.build_mode == 'all'
      run: |
        python -c "
        import subprocess
        import sys
        import shutil
        
        cmd = [
            'pyinstaller',
            '--name=PSDBatchProcessor-OneFile',
            '--noconsole',
            '--onefile',
            '--add-data=docs/guides/START_HERE.txt;docs/guides',
            '--add-data=docs/guides/QUICK_REFERENCE.txt;docs/guides',
            '--add-data=scripts/production/*.jsx;scripts/production',
            '--add-data=scripts/templates/*.jsx;scripts/templates',
            '--add-data=scripts/examples/*.jsx;scripts/examples',
            '--hidden-import=win32com',
            '--hidden-import=pythoncom',
            '--hidden-import=PIL',
            '--hidden-import=customtkinter',
            '--exclude-module=torch',
            '--exclude-module=torchvision',
            '--exclude-module=torchaudio',
            '--exclude-module=tensorflow',
            '--exclude-module=keras',
            '--exclude-module=scipy',
            '--exclude-module=numpy',
            '--exclude-module=sympy',
            '--exclude-module=onnxruntime',
            '--exclude-module=selenium',
            '--exclude-module=playwright',
            '--exclude-module=requests',
            '--exclude-module=beautifulsoup4',
            '--exclude-module=lxml',
            '--exclude-module=bs4',
            '--exclude-module=pandas',
            '--exclude-module=matplotlib',
            '--exclude-module=cv2',
            '--exclude-module=opencv-python',
            '--exclude-module=pytest',
            '--exclude-module=black',
            '--exclude-module=flake8',
            '--exclude-module=langchain',
            '--exclude-module=openai',
            '--exclude-module=anthropic',
            '--exclude-module=transformers',
            '--exclude-module=tokenizers',
            '--exclude-module=huggingface_hub',
            '--exclude-module=tkinter',
            '--exclude-module=turtle',
            '--clean',
            '--noconfirm',
            'src/main.py'
        ]
        
        result = subprocess.run(cmd)
        if result.returncode == 0:
            # Move to portable directory
            if not exist 'dist\PSDBatchProcessor-OneFile-Portable' mkdir 'dist\PSDBatchProcessor-OneFile-Portable'
            move /y 'dist\PSDBatchProcessor-OneFile.exe' 'dist\PSDBatchProcessor-OneFile-Portable\'
        
        sys.exit(result.returncode)
        "
        
    - name: Copy additional files
      run: |
        python tools/build_all.py
        
    - name: Get version
      id: version
      run: |
        if "${{ github.event_name }}" == "push" {
          echo "version=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
        } else {
          echo "version=dev-${{ github.run_number }}" >> $env:GITHUB_OUTPUT
        }
      shell: pwsh
      
    - name: Create Release Package
      run: |
        python -c "
        import shutil
        from pathlib import Path
        
        version = '${{ steps.version.outputs.version }}'
        
        # Create release directory
        release_dir = Path(f'dist/PSDBatchProcessor-{version}')
        if release_dir.exists():
            shutil.rmtree(release_dir)
        release_dir.mkdir()
        
        # Copy Windowed mode
        windowed_dir = Path('dist/PSDBatchProcessor-Windowed')
        if windowed_dir.exists():
            shutil.copytree(windowed_dir, release_dir / 'Windowed', dirs_exist_ok=True)
        
        # Copy Console mode
        console_dir = Path('dist/PSDBatchProcessor-Console')
        if console_dir.exists():
            shutil.copytree(console_dir, release_dir / 'Console', dirs_exist_ok=True)
        
        # Copy One-file mode
        onefile_dir = Path('dist/PSDBatchProcessor-OneFile-Portable')
        if onefile_dir.exists():
            shutil.copytree(onefile_dir, release_dir / 'OneFile', dirs_exist_ok=True)
        
        # Copy README
        if Path('README.md').exists():
            shutil.copy('README.md', release_dir)
        
        print(f'Created release package: {release_dir}')
        "
        
    - name: Zip Release
      run: |
        python -c "
        import shutil
        from pathlib import Path
        
        version = '${{ steps.version.outputs.version }}'
        release_dir = Path(f'dist/PSDBatchProcessor-{version}')
        
        if release_dir.exists():
            shutil.make_archive(str(release_dir), 'zip', release_dir.parent, release_dir.name)
            print(f'Created zip: {release_dir}.zip')
        "
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PSD-Batch-Processor-${{ steps.version.outputs.version }}
        path: dist/PSDBatchProcessor-${{ steps.version.outputs.version }}.zip
        retention-days: 30
        
    - name: Create Release
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v1
      with:
        files: dist/PSDBatchProcessor-${{ steps.version.outputs.version }}.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}